{% extends 'base/base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div style="max-width:680px;">
  <div class="card">
    <div class="card-header"><h3>{{ title }}</h3></div>
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Competency Code *</label>
            <input type="text" name="code" class="form-control" value="{{ competency.code|default:'' }}" placeholder="e.g. CORE-001" required>
          </div>
          <div class="form-group">
            <label class="form-label">Category *</label>
            <select name="category" class="form-control" required>
              {% for val,label in categories %}<option value="{{ val }}" {% if competency.category == val %}selected{% endif %}>{{ label }}</option>{% endfor %}
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Competency Name *</label>
          <input type="text" name="name" class="form-control" value="{{ competency.name|default:'' }}" required>
        </div>
        <div class="form-group">
          <label class="form-label">Description *</label>
          <textarea name="description" class="form-control" rows="3" required>{{ competency.description|default:'' }}</textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Behavioral Indicators</label>
          <textarea name="behavioral_indicators" class="form-control" rows="4" placeholder="Describe observable behaviors per proficiency level...">{{ competency.behavioral_indicators|default:'' }}</textarea>
        </div>
        <div style="display:flex;gap:12px;">
          <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Competency</button>
          <a href="{% url 'competency_list' %}" class="btn btn-outline">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
